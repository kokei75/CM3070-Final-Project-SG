<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resident Sign Up</title>

  <!--styles-->
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/generalLogin.css">
</head>
<body>
  <main class="page">
    <h1 class="big">RESIDENT SIGN UP</h1>

    <!--back to home-->
    <a class="back" href="/index.html">← Back to home</a>

    <!--signup form-->
    <form class="card auth" method="POST" action="/signup/resident" onsubmit="return validateForm()">

      <!--name input-->
      <div class="field">
        <label for="name">NAME:</label>
        <input id="name" name="name" type="text" placeholder="Your name" required>
      </div>

      <!--username input-->
      <div class="field">
        <label for="username">USERNAME:</label>
        <input id="username" name="username" type="text" placeholder="Choose a username" required>
      </div>

      <!--password input-->
      <div class="field">
        <label for="password">PASSWORD:</label>

        <div class="password-wrapper">
          <input id="password" name="password" type="password" placeholder="Create a password" required>

          <!--toggle show/hide password-->
          <button type="button" id="togglePassword" class="eye" aria-label="Show password">👁️</button>
        </div>

        <!--password validation message-->
        <p id="passwordError" class="error-text">
          Password must be at least 8 characters and include uppercase, lowercase, and a number
        </p>
      </div>

      <button class="btn" type="submit">CREATE ACCOUNT</button>
    </form>

    <!--login redirect-->
    <p class="small">
      Already have an account?
      <a href="/residentLogin.html">Log in</a>
    </p>
  </main>

  <script>
    //get elements
    const toggle = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");
    const error = document.getElementById("passwordError");

    //toggle password visibility
    toggle.addEventListener("click", () => {
      const isHidden = passwordInput.type === "password";

      passwordInput.type = isHidden ? "text" : "password";
      toggle.textContent = isHidden ? "🙈" : "👁️";
      toggle.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
    });

    //hide error when user types
    passwordInput.addEventListener("input", () => {
      error.style.display = "none";
    });

    //validate password before submit
    function validateForm() {
      const password = passwordInput.value;

      //at least 8 chars, 1 uppercase, 1 lowercase, 1 number
      const strongPassword = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

      if (!strongPassword.test(password)) {
        error.style.display = "block";
        return false;
      }

      error.style.display = "none";
      return true;
    }
  </script>
</body>
</html>
